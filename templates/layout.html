{{define "head"}}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - Ecomp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/custom.css?v=11" rel="stylesheet">
</head>
{{end}}

{{define "layout"}}
<!DOCTYPE html>
<html lang="zh-CN">
{{template "head" .}}
<body class="page-{{.ActivePage}}">
<div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <i class="bi bi-cpu-fill"></i>
            <span>Ecomp</span>
        </div>
        <nav class="sidebar-nav">
            <ul class="sidebar-menu">
                {{if .Configured}}
                <li>
                    <a href="/" class="sidebar-menu-item {{if eq .ActivePage "dashboard"}}active{{end}}">
                        <i class="bi bi-house-door"></i> <span>首页</span>
                    </a>
                </li>
                <li>
                    <a href="/components" class="sidebar-menu-item {{if eq .ActivePage "components"}}active{{end}}">
                        <i class="bi bi-grid-3x3-gap"></i> <span>元器件</span>
                    </a>
                </li>
                <li>
                    <a href="/transactions/inbound" class="sidebar-menu-item {{if eq .ActivePage "inbound"}}active{{end}}">
                        <i class="bi bi-box-arrow-in-down"></i> <span>入库</span>
                    </a>
                </li>
                <li>
                    <a href="/transactions/lcsc" class="sidebar-menu-item {{if eq .ActivePage "lcsc"}}active{{end}}">
                        <i class="bi bi-layers"></i> <span>立创导入</span>
                    </a>
                </li>
                <li>
                    <a href="/transactions/outbound" class="sidebar-menu-item {{if eq .ActivePage "outbound"}}active{{end}}">
                        <i class="bi bi-box-arrow-up"></i> <span>出库</span>
                    </a>
                </li>
                <li>
                    <a href="/transactions/history" class="sidebar-menu-item {{if eq .ActivePage "history"}}active{{end}}">
                        <i class="bi bi-kanban"></i> <span>记录</span>
                    </a>
                </li>
                {{end}}
                <li>
                    <a href="/settings" class="sidebar-menu-item {{if eq .ActivePage "settings"}}active{{end}}">
                        <i class="bi bi-gear"></i> <span>设置</span>
                    </a>
                </li>
            </ul>
        </nav>
    </aside>

    <!-- Mobile overlay -->
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- Main -->
    <div class="main">
        <header class="header">
            <div class="header-left">
                <button class="sidebar-toggle" onclick="toggleSidebar()">
                    <i class="bi bi-list"></i>
                </button>
                <nav class="breadcrumb">
                    <a href="/">COMPONENT LOGISTICS PORTAL</a>
                    <span class="sep">/</span>
                    <span class="current">{{.Title}}</span>
                </nav>
            </div>
            <div class="header-actions">
                <button class="icon-btn header-icon" title="Apps"><i class="bi bi-grid"></i></button>
                <button class="icon-btn header-icon" title="Notifications"><i class="bi bi-bell"></i></button>
                <a href="/settings" class="btn btn-sm">
                    <i class="bi bi-gear"></i> 设置
                </a>
            </div>
        </header>

        <!-- Flash -->
        {{if .Flash}}
        <div class="alert alert-{{.FlashType}} alert-dismissible" style="margin:0;border-radius:0;border-left:0;border-right:0">
            <i class="bi {{if eq .FlashType "success"}}bi-check-circle{{else if eq .FlashType "danger"}}bi-x-circle{{else}}bi-exclamation-circle{{end}}"></i>
            {{.Flash}}
            <button class="btn-close" onclick="this.parentElement.remove()">&times;</button>
        </div>
        {{end}}

        <!-- Content -->
        <div class="content">
            {{template "content" .}}
        </div>
    </div>
</div>
<script src="/static/js/app.js"></script>
</body>
</html>
{{end}}
