{{define "content"}}
<div style="max-width:520px">
    <div class="card">
        <div class="card-header">
            <i class="bi bi-gear"></i> 数据库设置
        </div>
        <div class="card-body">
            {{with .Data}}
            {{if $.Configured}}
            <div class="alert alert-success mb-4">
                <i class="bi bi-check-circle"></i> 数据库已连接
            </div>
            {{else}}
            <div class="alert alert-warning mb-4">
                <i class="bi bi-exclamation-triangle"></i> 尚未配置数据库连接
            </div>
            {{end}}

            <form method="POST" action="/settings">
                {{csrfField $.CSRFToken}}

                <div class="form-group">
                    <label class="form-label">主机地址 <span class="required">*</span></label>
                    <input type="text" class="form-control" name="db_host"
                           value="{{.Config.DBHost}}" placeholder="如: host.docker.internal">
                </div>

                <div class="form-group">
                    <label class="form-label">端口</label>
                    <input type="number" class="form-control" name="db_port"
                           value="{{.Config.DBPort}}" placeholder="3306">
                </div>

                <div class="form-group">
                    <label class="form-label">用户名 <span class="required">*</span></label>
                    <input type="text" class="form-control" name="db_user"
                           value="{{.Config.DBUser}}" placeholder="root">
                </div>

                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-control" name="db_password"
                           value="{{.Config.DBPassword}}">
                </div>

                <div class="form-group">
                    <label class="form-label">数据库名 <span class="required">*</span></label>
                    <input type="text" class="form-control" name="db_name"
                           value="{{.Config.DBName}}" placeholder="ecomp">
                </div>

                <div class="flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check"></i> 保存配置
                    </button>
                    <button type="button" class="btn" onclick="testConnection()">
                        <i class="bi bi-wifi"></i> 测试连接
                    </button>
                </div>
            </form>
            {{end}}
        </div>
    </div>
</div>

<script>
function testConnection() {
    const data = {
        db_host: document.querySelector('[name="db_host"]').value,
        db_port: parseInt(document.querySelector('[name="db_port"]').value) || 3306,
        db_user: document.querySelector('[name="db_user"]').value,
        db_password: document.querySelector('[name="db_password"]').value,
        db_name: document.querySelector('[name="db_name"]').value
    };
    let el = document.getElementById('test-result');
    if (!el) {
        el = document.createElement('div');
        el.id = 'test-result';
        el.className = 'alert mt-3';
        document.querySelector('.card-body').appendChild(el);
    }
    fetch('/settings/test', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    })
    .then(r => r.json())
    .then(d => {
        el.className = 'alert mt-3 ' + (d.success ? 'alert-success' : 'alert-danger');
        el.innerHTML = '<i class="bi ' + (d.success ? 'bi-check-circle' : 'bi-x-circle') + '"></i> ' + d.message;
    })
    .catch(e => {
        el.className = 'alert mt-3 alert-danger';
        el.textContent = '请求失败: ' + e.message;
    });
}
</script>
{{end}}
